<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2f7d4f" />
  <title>fridge.ai — 내 냉장고</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- ===== Top bar ===== -->
    <header class="appbar">
      <div class="appbar-row">
        <div class="appbar-title">
          <span class="appbar-logo">🥬</span>
          <div>
            <h1 id="fridgeName">우리집 냉장고</h1>
            <span class="appbar-date" id="todayLabel">오늘</span>
          </div>
        </div>
        <div class="appbar-actions">
          <button class="icon-btn" id="bellBtn" aria-label="알림">🔔<span class="bell-dot" id="bellDot" hidden></span></button>
          <div class="user-chip">
            <span class="user-initial" id="userInitial">김</span>
            <span class="user-chip-name" id="userDisplayName">민준</span>
          </div>
        </div>
      </div>
    </header>

    <!-- ===== Scrollable content ===== -->
    <main class="content" id="content">

      <!-- ---- HOME ---- -->
      <section class="view view-home is-active" id="view-home">

        <!-- guardian banner -->
        <div class="guardian-banner" id="guardianBanner"></div>

        <!-- summary -->
        <div class="summary">
          <!-- 임박: hero card spanning full width -->
          <button class="summary-card sc-urgent" data-status="urgent">
            <div class="sc-content">
              <span class="sc-num" id="sumUrgent">0</span>
              <span class="sc-label">임박 재료</span>
            </div>
            <span class="sc-icon" aria-hidden="true">🔥</span>
          </button>
          <!-- 3 mini stat cards -->
          <button class="summary-card sc-warn" data-status="warn">
            <span class="sc-icon" aria-hidden="true">⚠️</span>
            <span class="sc-num" id="sumWarn">0</span>
            <span class="sc-label">주의</span>
          </button>
          <button class="summary-card sc-ok" data-status="fresh">
            <span class="sc-icon" aria-hidden="true">🌿</span>
            <span class="sc-num" id="sumFresh">0</span>
            <span class="sc-label">신선</span>
          </button>
          <button class="summary-card sc-total" data-status="all">
            <span class="sc-icon" aria-hidden="true">🧊</span>
            <span class="sc-num" id="sumTotal">0</span>
            <span class="sc-label">전체</span>
          </button>
        </div>

        <!-- recommendation -->
        <div class="block">
          <div class="block-head">
            <h2>오늘의 추천 🍳</h2>
            <button class="link-btn" data-goto="recipes">더보기</button>
          </div>
          <p class="block-sub" id="recoQueryHint"></p>
          <div class="reco-list" id="homeReco"></div>
        </div>

        <!-- urgent strip -->
        <div class="block">
          <div class="block-head">
            <h2>곧 사라져요 ⏰</h2>
            <button class="link-btn" data-goto="stock">전체보기</button>
          </div>
          <div class="urgent-scroll" id="urgentScroll"></div>
        </div>
      </section>

      <!-- ---- STOCK ---- -->
      <section class="view view-stock" id="view-stock">
        <div class="search-row">
          <span class="search-ico">🔍</span>
          <input type="search" id="stockSearch" placeholder="재료 검색" aria-label="재료 검색" />
        </div>
        <div class="chips status-chips" id="statusChips"></div>
        <div class="chips" id="catChips"></div>
        <div class="stock-list" id="stockList"></div>
        <div class="empty" id="stockEmpty" hidden>
          <span>🧺</span>
          <p>해당하는 재료가 없어요</p>
        </div>
      </section>

      <!-- ---- RECIPES ---- -->
      <section class="view view-recipes" id="view-recipes">
        <div class="reco-banner">
          <span class="reco-banner-label">임박 재료로 만드는 요리</span>
          <strong id="recoQuery">—</strong>
          <span class="reco-banner-sub">마감이 가까운 재료부터 소진해요</span>
        </div>
        <div class="reco-list" id="recipeList"></div>
      </section>

      <!-- ---- REPORT ---- -->
      <section class="view view-report" id="view-report">

        <!-- 핵심 히어로: 음식물 쓰레기 절감 -->
        <div class="rp-hero">
          <div class="rp-hero-top">
            <span class="rp-hero-label">이번 달 구출한 재료</span>
            <span class="rp-badge-chip" id="rpBadgeChip">🌱 새싹 절약가</span>
          </div>
          <div class="rp-hero-count">
            <span class="rp-hero-num" id="rpHeroSaved">0</span>
            <span class="rp-hero-unit">개</span>
          </div>
          <div class="rp-hero-sub">
            음식물 쓰레기 약 <strong id="rpWasteG">0g</strong> 절감
            &nbsp;·&nbsp; 쓰레기봉투 <strong id="rpBags">0장</strong> 아꼈어요 🗑️
          </div>
        </div>

        <!-- 4개 수치 -->
        <div class="report-grid">
          <div class="report-stat">
            <span class="rp-ico">💰</span>
            <strong id="rpSaveMoney">₩0</strong>
            <span>절약 식비</span>
          </div>
          <div class="report-stat">
            <span class="rp-ico">🍳</span>
            <strong id="rpCook">0회</strong>
            <span>조리 완료</span>
          </div>
          <div class="report-stat">
            <span class="rp-ico">🌍</span>
            <strong id="rpCO2">0kg</strong>
            <span>CO₂ 절감</span>
          </div>
          <div class="report-stat">
            <span class="rp-ico">💧</span>
            <strong id="rpWater">0L</strong>
            <span>물 절약</span>
          </div>
        </div>

        <!-- 구출 재료 목록 -->
        <div class="block rp-block">
          <div class="block-head"><h2>🥕 구출한 재료들</h2></div>
          <div class="rp-saved-list" id="rpSavedItems">
            <span class="rp-empty-msg">조리완료 버튼을 눌러 재료를 소진해보세요</span>
          </div>
        </div>

        <!-- 주간 소진 추이 -->
        <div class="block rp-block">
          <div class="block-head"><h2>📊 주간 소진 추이</h2></div>
          <div class="rp-bars-wrap">
            <div class="bars" id="reportBars"></div>
            <div class="rp-bar-days" id="rpBarDays"></div>
          </div>
        </div>

      </section>
      </section>

    </main>

    <!-- ===== Add FAB ===== -->
    <button class="fab" id="fab" aria-label="재료 추가">＋</button>

    <!-- ===== Bottom nav ===== -->
    <nav class="tabbar" aria-label="메인 메뉴">
      <button class="tab is-active" data-view="home"><span class="tab-ico">🏠</span><span>홈</span></button>
      <button class="tab" data-view="stock"><span class="tab-ico">🧺</span><span>재고</span></button>
      <button class="tab" data-view="recipes"><span class="tab-ico">🍳</span><span>추천</span></button>
      <button class="tab" data-view="report"><span class="tab-ico">🌱</span><span>리포트</span></button>
    </nav>
  </div>

  <!-- ===== Add ingredient sheet ===== -->
  <div class="sheet-overlay" id="sheetOverlay">
    <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <h3 id="sheetTitle">재료 추가</h3>
        <button class="icon-btn" id="sheetClose" aria-label="닫기">✕</button>
      </div>

      <label class="field-label">자주 사는 재료</label>
      <div class="quick-add" id="quickAdd"></div>

      <form id="addForm" class="add-form">
        <label class="field-label" for="inName">재료 이름</label>
        <input id="inName" name="name" type="text" list="ingredientList" placeholder="DB에 등록된 재료 검색" required autocomplete="off" />
        <datalist id="ingredientList"></datalist>
        <span class="field-hint" id="nameHint"></span>

        <label class="field-label">카테고리</label>
        <div class="cat-auto" id="catAuto">재료를 선택하면 자동으로 정해져요</div>

        <div class="field-row">
          <div>
            <label class="field-label" for="inQty">수량</label>
            <input id="inQty" name="qty" type="text" placeholder="예: 3개 / 500g" />
          </div>
          <div>
            <label class="field-label" for="inExpiry">소비기한</label>
            <input id="inExpiry" name="expiry" type="date" required />
            <span class="field-hint expiry-hint" id="expiryHint"></span>
          </div>
        </div>

        <button type="submit" class="btn-primary btn-block">냉장고에 넣기</button>
      </form>
    </div>
  </div>

  <!-- ===== Edit qty sheet ===== -->
  <div class="sheet-overlay" id="editOverlay">
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="editSheetTitle">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <h3 id="editSheetTitle">남은 수량 수정</h3>
        <button class="icon-btn" id="editSheetClose" aria-label="닫기">✕</button>
      </div>
      <div class="edit-item-name" id="editItemName"></div>
      <form id="editQtyForm" class="add-form">
        <label class="field-label" for="editQtyInput">남은 수량</label>
        <input id="editQtyInput" type="text" placeholder="예: 200g / 2개" required autocomplete="off" />
        <button type="submit" class="btn-primary btn-block">수량 저장</button>
      </form>
    </div>
  </div>

  <!-- ===== Toast ===== -->
  <div class="toast" id="toast" hidden></div>

  <script src="data.js"></script>
  <script src="recipes.js"></script>
  <script src="recipes_cookrcp.js"></script>
  <script src="explanations.js"></script>
  <script src="app.js"></script>
</body>
</html>
